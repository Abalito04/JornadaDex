services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      SECRET_KEY: "change-this-secret"
      DATABASE_URL: "sqlite:////app/instance/time_control.db"
      SESSION_COOKIE_SECURE: "false"
    volumes:
      - app-data:/app/instance
    command: >
      sh -c "flask init-db && gunicorn -b 0.0.0.0:5000 run:app"

volumes:
  app-data:
