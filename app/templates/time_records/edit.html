{% extends "base.html" %}
{% block title %}Editar registro{% endblock %}
{% block content %}
<section class="page-title">
  <h1>Editar registro</h1>
  <p>Corregi datos operativos del registro sin modificar la fecha ni los horarios automaticos.</p>
</section>

<section class="panel">
  <form method="post" class="grid-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div>
      <label>Empleado</label>
      <select name="employee_id" required>
        {% for employee in employees %}
          <option value="{{ employee.id }}" {% if employee.id == record.employee_id %}selected{% endif %}>{{ employee.full_name }}</option>
        {% endfor %}
      </select>
    </div>
    {% if can_choose_supervisor %}
      <div>
        <label>Supervisor responsable</label>
        <select name="supervisor_id" required>
          {% for supervisor in supervisors %}
            <option value="{{ supervisor.id }}" {% if supervisor.id == record.supervisor_id %}selected{% endif %}>{{ supervisor.employee.full_name if supervisor.employee else supervisor.username }}</option>
          {% endfor %}
        </select>
      </div>
    {% else %}
      <div>
        <label>Supervisor responsable</label>
        <input value="{{ record.supervisor.employee.full_name if record.supervisor and record.supervisor.employee else record.supervisor.username if record.supervisor else current_user.username }}" disabled>
        <input type="hidden" name="supervisor_id" value="{{ record.supervisor_id or current_user.id }}">
      </div>
    {% endif %}
    <div>
      <label>Cliente</label>
      <select name="accounting_client_id" required>
        {% for client in clients %}
          <option value="{{ client.id }}" {% if client.id == record.accounting_client_id %}selected{% endif %}>{{ client.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div>
      <label>Area</label>
      <select id="areaSelect" name="area_id" required>
        {% for area in areas %}
          <option value="{{ area.id }}" {% if area.id == record.area_id %}selected{% endif %}>{{ area.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div>
      <label>Tarea</label>
      <select id="taskSelect" name="task_id" required>
        {% for task in tasks %}
          <option value="{{ task.id }}" {% if task.id == record.task_id %}selected{% endif %}>{{ task.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div>
      <label>Fecha</label>
      <input value="{{ record.record_date }}" disabled>
    </div>
    <div>
      <label>Inicio</label>
      <input value="{{ format_time_hs(record.start_time) }}" disabled>
    </div>
    <div>
      <label>Fin</label>
      <input value="{{ format_time_hs(record.end_time) }}" disabled>
    </div>
    <div class="full">
      <label>Observaciones del registro</label>
      <textarea name="observations" rows="3">{{ record.observations or "" }}</textarea>
    </div>
    <div class="full">
      <label>Observacion de edicion</label>
      <textarea name="edit_note" rows="2" placeholder="Ejemplo: el empleado salio a realizar una gestion externa y se corrige la tarea asociada."></textarea>
    </div>
    <div class="full form-actions">
      <button type="submit"><i data-lucide="save"></i>Guardar cambios</button>
      <a class="button ghost" href="{{ url_for('time_records.index') }}">Cancelar</a>
    </div>
  </form>
</section>
{% endblock %}
