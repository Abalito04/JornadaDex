{% extends "base.html" %}
{% block title %}Editar empresa{% endblock %}
{% block content %}
<section class="page-title">
  <h1>Editar empresa</h1>
  <p>Modifica datos generales de la empresa seleccionada.</p>
</section>

<section class="panel">
  <form method="post" class="grid-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div>
      <label>Nombre</label>
      <input name="name" value="{{ company.name }}" required>
    </div>
    <div>
      <label>Identificador fiscal</label>
      <input name="tax_id" value="{{ company.tax_id or '' }}">
    </div>
    <div class="full checkbox-row">
      <input id="active" name="active" type="checkbox" {% if company.active %}checked{% endif %}>
      <label for="active">Empresa activa</label>
    </div>
    <div class="full form-actions">
      <button type="submit">Guardar cambios</button>
      <a class="button ghost" href="{{ url_for('platform.companies') }}">Cancelar</a>
    </div>
  </form>
</section>
{% endblock %}
