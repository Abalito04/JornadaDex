{% extends "base.html" %}
{% block title %}Editar usuario{% endblock %}
{% block content %}
<section class="page-title">
  <h1>Editar usuario</h1>
  <p>Modifica acceso, rol, empresa y recuperacion de clave.</p>
</section>

<section class="panel">
  <form method="post" class="grid-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div>
      <label>Usuario</label>
      <input name="username" value="{{ user.username }}" required>
    </div>
    <div>
      <label>Email</label>
      <input name="email" type="email" value="{{ user.email }}" required>
    </div>
    <div>
      <label>Empresa</label>
      <select name="company_id">
        {% for company in companies %}
          <option value="{{ company.id }}" {% if company.id == user.company_id %}selected{% endif %}>{{ company.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div>
      <label>Rol</label>
      <select name="role">
        {% for value, label in [("Employee", "Empleado"), ("Supervisor", "Supervisor"), ("Owner", "Dueño"), ("Developer", "Developer")] %}
          <option value="{{ value }}" {% if user.role == value or (value == "Owner" and user.is_company_owner) %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
      </select>
    </div>
    <div>
      <label>Nueva clave</label>
      <input name="password" type="password" placeholder="Dejar vacio para no cambiar">
    </div>
    <div class="full checkbox-row">
      <input id="is_active" name="is_active" type="checkbox" {% if user.is_active_flag %}checked{% endif %}>
      <label for="is_active">Usuario activo</label>
    </div>
    <div class="full form-actions">
      <button type="submit">Guardar cambios</button>
      <a class="button ghost" href="{{ url_for('platform.users') }}">Cancelar</a>
    </div>
  </form>
</section>
{% endblock %}
