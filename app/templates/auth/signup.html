{% extends "base.html" %}
{% block title %}Crear empresa{% endblock %}
{% block content %}
<section class="auth-shell signup-shell">
  <div class="auth-copy">
    <span class="auth-eyebrow">Nueva cuenta</span>
    <h1>Crear empresa</h1>
    <p>El primer usuario sera el Dueño/Jefe y podra administrar empleados, areas, tareas y permisos.</p>
  </div>

  <section class="auth-card wide">
    <h2>Datos iniciales</h2>
    <form method="post" class="grid-form">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div>
        <label>Empresa</label>
        <input name="company_name" required>
      </div>
      <div>
        <label>Nombre del jefe</label>
        <input name="owner_name" required>
      </div>
      <div>
        <label>Email</label>
        <input name="email" type="email" required>
      </div>
      <div>
        <label>Usuario</label>
        <input name="username" autocomplete="username" required>
      </div>
      <div>
        <label>Clave</label>
        <input name="password" type="password" autocomplete="new-password" required>
      </div>
      <div class="full form-actions">
        <button type="submit">Crear empresa</button>
        <a class="button ghost" href="{{ url_for('auth.login') }}">Volver al ingreso</a>
      </div>
    </form>
  </section>
</section>
{% endblock %}
