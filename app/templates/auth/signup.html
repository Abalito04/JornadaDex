{% extends "base.html" %}
{% block title %}Crear empresa{% endblock %}
{% block content %}
<section class="auth-shell signup-shell">
  <div class="auth-copy">
    <svg class="auth-logo" viewBox="0 0 48 48" fill="none" aria-hidden="true">
      <rect x="7" y="7" width="34" height="34" rx="9" stroke="currentColor" stroke-width="2"></rect>
      <path d="M16 31V17h5.5c4.2 0 7 2.7 7 7s-2.8 7-7 7H16Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"></path>
      <path d="M31 17v14h5" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
    </svg>
    <span class="auth-eyebrow">Nueva cuenta</span>
    <h1>Crear empresa</h1>
    <p>El primer usuario sera el Dueño/Jefe y podra administrar empleados, clientes, areas, tareas y permisos.</p>
  </div>

  <section class="auth-card wide">
    <div class="auth-card-kicker">Configuracion inicial</div>
    <h2>Datos iniciales</h2>
    <form method="post" class="grid-form">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div>
        <label>Empresa</label>
        <input name="company_name" required>
      </div>
      <div>
        <label>Nombre del jefe</label>
        <input name="owner_name" required>
      </div>
      <div>
        <label>Email</label>
        <input name="email" type="email" required>
      </div>
      <div>
        <label>Usuario</label>
        <input name="username" autocomplete="username" required>
      </div>
      <div>
        <label>Clave</label>
        <input name="password" type="password" autocomplete="new-password" required>
      </div>
      <div class="full form-actions">
        <button type="submit"><i data-lucide="building-2"></i>Crear empresa</button>
        <a class="button ghost" href="{{ url_for('auth.login') }}">Volver al ingreso</a>
      </div>
    </form>
  </section>
</section>
{% endblock %}
