{% extends "base.html" %}
{% block title %}Nueva clave{% endblock %}
{% block content %}
<section class="auth-shell">
  <section class="auth-card">
    <div class="auth-card-kicker">Seguridad</div>
    <h2>Nueva clave</h2>
    <p>Elegi una clave segura para recuperar el acceso.</p>
    <form method="post" class="auth-form">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div>
        <label>Nueva clave</label>
        <input name="password" type="password" autocomplete="new-password" required>
      </div>
      <div>
        <label>Confirmar clave</label>
        <input name="confirm_password" type="password" autocomplete="new-password" required>
      </div>
      <button type="submit"><i data-lucide="key-round"></i>Actualizar clave</button>
      <a class="button ghost" href="{{ url_for('auth.login') }}"><i data-lucide="arrow-left"></i>Volver al ingreso</a>
    </form>
  </section>
</section>
{% endblock %}
