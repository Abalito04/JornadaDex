{% extends "base.html" %}
{% block title %}Restablecer clave{% endblock %}
{% block content %}
<section class="auth-shell">
  <section class="auth-card">
    <div class="auth-card-kicker">Seguridad</div>
    <h2>Restablecer clave</h2>
    <p>Ingresa tu usuario o email y te enviaremos un enlace temporal.</p>
    <form method="post" class="auth-form">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div>
        <label>Usuario o email</label>
        <input name="identifier" autocomplete="username" required>
      </div>
      <button type="submit"><i data-lucide="mail"></i>Enviar enlace</button>
      <a class="button ghost" href="{{ url_for('auth.login') }}"><i data-lucide="arrow-left"></i>Volver al ingreso</a>
    </form>
  </section>
</section>
{% endblock %}
