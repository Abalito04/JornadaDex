<div class="bar-chart">
  {% for row in chart_rows|default(client_chart) %}
    <div class="bar-row">
      <div class="bar-label">
        <span>{{ row.label }}</span>
        <strong>{{ format_duration_hs(row.value) }}</strong>
      </div>
      <div class="bar-track"><div class="bar-fill" style="width: {{ row.width }}%"></div></div>
    </div>
  {% else %}
    <div class="empty-state compact">
      <i data-lucide="bar-chart-3"></i>
      <strong>Sin datos para graficar.</strong>
      <span>Cuando haya registros cargados, el grafico se completa automaticamente.</span>
    </div>
  {% endfor %}
</div>
